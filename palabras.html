<style>

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: 'Noto Sans KR', sans-serif; }
  body { padding-bottom: env(safe-area-inset-bottom); }

  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; align-items: center; }

  .card-wrap { display: flex; align-items: center; gap: 10px; }

  .star-btn { background: none; border: none; cursor: pointer; color: var(--ochre); font-size: 18px; }
  .word-main { font-size: 32px; font-weight: 600; margin: 22px 0 8px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

  .speak-btn { background: var(--azulejo); border: none; color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; font-size: 14px; }

  .btn-row { display: flex; gap: 8px; margin-top: 12px; }

  .review-section-title { font-size: 12px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--ink-soft); margin: 22px 0 10px; }
  .review-item { background: var(--paper); border: 1px solid var(--border); border-left: 3px solid var(--mistake); border-radius: 10px; padding: 16px 18px; margin-bottom: 12px; }

  .review-user-answer { font-size: 13px; color: var(--ink-soft); background: var(--bg); border-radius: 8px; padding: 8px 10px; margin-bottom: 10px; }
  .review-input-row { display: flex; gap: 8px; }
  .review-input-row input { flex: 1; border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; font-size: 14px; font-family: 'Noto Sans KR', sans-serif; }
  .icon-btn { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; cursor: pointer; color: var(--ink-soft); font-size: 13px; }
  .review-note { font-size: 12px; color: var(--mistake); margin-top: 6px; }

  .install-tip button { background: none; border: none; color: #6B4E1D; font-weight: 700; cursor: pointer; font-size: 14px; flex-shrink: 0; }

/* ------------------------------------------------------------------ */
/* Stress + syllable helpers                                           */
/* ------------------------------------------------------------------ */
function toWord(syllStr) { return syllStr.split("-").join(""); }
function computeStress(syllStr) {
  var sylls = syllStr.split("-");
  var accented = "áéíóú";
  for (var i = 0; i < sylls.length; i++) {
    for (var j = 0; j < sylls[i].length; j++) {
      if (accented.indexOf(sylls[i][j]) !== -1) return i;
    }
  }
  var word = toWord(syllStr);
  var last = word.slice(-1);
  if ("aeiouns".indexOf(last) !== -1) return Math.max(sylls.length - 2, 0);
  return sylls.length - 1;
}
function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, function (c) {
    return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];

}

var WORDS = [];
PATTERNS.forEach(function (p) {
  p.words.forEach(function (w, i) {
    WORDS.push({
      id: p.key + "-" + i,
      syllables: w[0].split("-"),
      stress: computeStress(w[0]),
      es: toWord(w[0]),
      ko: w[1],
      en: w[2],
      example: w[3],
      exampleKo: w[4],
      patternLabel: p.esSuffix + " · " + p.enSuffix,
      etymology: p.note,
      groupType: "pattern"
    });
  });
});
BASIC_GROUPS.forEach(function (g) {
  g.words.forEach(function (w, i) {
    WORDS.push({
      id: "basic-" + g.key + "-" + i,
      syllables: w[0].split("-"),
      stress: computeStress(w[0]),
      es: toWord(w[0]),
      ko: w[1],
      en: w[2],
      example: w[3],
      exampleKo: w[4],
      patternLabel: g.label,
      etymology: '"' + g.label + '" 주제로 자주 쓰는 기초 단어예요.',
      groupType: "basic"
    });
  });
});
var FILTERS = ["전체"].concat(PATTERNS.map(function (p) { return p.esSuffix + " · " + p.enSuffix; })).concat(BASIC_GROUPS.map(function (g) { return g.label; }));

/* ------------------------------------------------------------------ */
/* Persistence                                                          */
/* ------------------------------------------------------------------ */
var STORE_KEY = "palabras_v1";
function loadStore() {
  try {
    var raw = localStorage.getItem(STORE_KEY);
    if (!raw) throw new Error("empty");
    var data = JSON.parse(raw);
    return {
      favorites: new Set(data.favorites || []),
      viewed: new Set(data.viewed || []),
      mistakes: data.mistakes || [],
      installDismissed: !!data.installDismissed
    };
  } catch (e) {
    return { favorites: new Set(), viewed: new Set(), mistakes: [], installDismissed: false };
  }
}
function saveStore() {
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify({
      favorites: Array.from(state.favorites),
      viewed: Array.from(state.viewed),
      mistakes: state.mistakes,
      installDismissed: state.installDismissed
    }));
  } catch (e) {}
}

/* ------------------------------------------------------------------ */
/* State                                                                 */
/* ------------------------------------------------------------------ */
var persisted = loadStore();
var state = {
  tab: "cards",
  filter: "전체",
  cardIndex: 0,
  flipped: false,
  favorites: persisted.favorites,
  viewed: persisted.viewed,
  onlyFavorites: false,
  installDismissed: persisted.installDismissed,
  quizWordId: WORDS[0].id,
  quizFeedback: null,
  sentenceWordId: WORDS[1].id,
  sentenceInput: "",
  sentenceFeedback: null,
  mistakes: persisted.mistakes,
  reviewInputs: {}
};
var mistakeSeq = (state.mistakes.reduce(function (m, x) { return Math.max(m, x.rid || 0); }, 0)) + 1;
function nextId() { return mistakeSeq++; }

/* ------------------------------------------------------------------ */
/* Helpers                                                               */
/* ------------------------------------------------------------------ */
function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  var utter = new SpeechSynthesisUtterance(text);
  utter.lang = "es-ES";
  utter.rate = 0.85;
  var voices = window.speechSynthesis.getVoices();
  var esVoice = voices.find(function (v) { return v.lang && v.lang.indexOf("es") === 0; });
  if (esVoice) utter.voice = esVoice;
  window.speechSynthesis.speak(utter);
}
function checkSentence(word, raw) {
  var trimmed = raw.trim();
  var containsWord = trimmed.toLowerCase().indexOf(word.es.toLowerCase()) !== -1;
  var wordCount = trimmed.split(/\s+/).filter(Boolean).length;
  var passed = containsWord && wordCount >= 3;
  return { passed: passed, containsWord: containsWord, wordCount: wordCount, trimmed: trimmed };
}
function getFilteredWords() {
  var list = state.filter === "전체" ? WORDS : WORDS.filter(function (w) { return w.patternLabel === state.filter; });
  if (state.onlyFavorites) list = list.filter(function (w) { return state.favorites.has(w.id); });
  return list;
}
function pickRandomWord(excludeId) {
  var pool = WORDS.filter(function (w) { return w.id !== excludeId; });
  return pool[Math.floor(Math.random() * pool.length)];
}
function findWord(id) { return WORDS.filter(function (w) { return w.id === id; })[0]; }

function renderHeader() {
  document.getElementById("learnedCount").textContent = state.viewed.size;
  document.getElementById("totalCount").textContent = WORDS.length;
  document.getElementById("subtitle").textContent = "접미사 패턴으로 배우는 스페인어 동족어 " + WORDS.length + "개";
  var badge = document.getElementById("mistakeBadge");
  if (state.mistakes.length > 0) { badge.style.display = "flex"; badge.textContent = state.mistakes.length; }
  else { badge.style.display = "none"; }
  document.querySelectorAll(".tab-btn").forEach(function (btn) {
    btn.classList.toggle("active", btn.dataset.tab === state.tab);
  });
}

/* Render: install tip (Add to Home Screen)                              */

function renderInstallTip() {
  var el = document.getElementById("installTip");
  var isStandalone = window.navigator.standalone || window.matchMedia("(display-mode: standalone)").matches;
  var isIOS = /iphone|ipad|ipod/i.test(window.navigator.userAgent);
  if (isStandalone || state.installDismissed || !isIOS) { el.innerHTML = ""; return; }
  el.innerHTML =
    '<div class="install-tip">' +
      '<span>📲 하단 공유 버튼 → <b>홈 화면에 추가</b>를 누르면 앱처럼 바탕화면에서 바로 열 수 있어요.</span>' +
      '<button id="dismissInstall">✕</button>' +
    '</div>';
  document.getElementById("dismissInstall").addEventListener("click", function () {
    state.installDismissed = true;
    saveStore();
    renderInstallTip();
  });
}

/* ------------------------------------------------------------------ */
/* Render: cards tab                                                     */
/* ------------------------------------------------------------------ */
function renderCards() {
  var filtered = getFilteredWords();
  var idx = filtered.length ? state.cardIndex % filtered.length : 0;
  var card = filtered.length ? filtered[idx] : null;

  var html = '<div class="filters">';
  FILTERS.forEach(function (f) {
    html += '<button class="chip' + (state.filter === f ? " active" : "") + '" data-filter="' + escapeHtml(f) + '">' + escapeHtml(f) + '</button>';
  });
  html += '<button class="fav-toggle" id="favToggle">' + (state.onlyFavorites ? "★" : "☆") + ' 즐겨찾기만</button>';
  html += '</div>';

  if (!card) {
    html += '<div class="empty-state"><div class="icon">📖</div><div>조건에 맞는 단어가 없어요. 필터를 바꿔보세요.</div></div>';
    document.getElementById("tabContent").innerHTML = html;
    bindCardEvents();
    return;
  }

  html += '<div class="card-wrap">';
  html += '<button class="nav-arrow" id="prevCard">‹</button>';
  html += '<div class="card" id="flipCard">';
  html += '<div class="card-top"><span class="cat-label">' + escapeHtml(card.patternLabel) + '</span>';
  html += '<button class="star-btn" id="starBtn">' + (state.favorites.has(card.id) ? "★" : "☆") + '</button></div>';
  html += '<div class="word-main es-word">';
  card.syllables.forEach(function (s, i) {
    html += '<span class="' + (i === card.stress ? "stress-mark" : "") + '">' + escapeHtml(s) + '</span>';
  });
  html += '<button class="speak-btn" id="speakBtn">🔊</button>';
  html += '</div>';
  html += '<div class="word-ko">' + escapeHtml(card.ko) + '</div>';
  if (!state.flipped) {
    html += '<div class="flip-hint">카드를 눌러 ' + (card.groupType === "basic" ? "뜻과 예문" : "어원과 예문") + ' 보기</div>';
  } else {
    html += '<div class="bridge"><div class="bridge-row">';
    html += '<span class="bridge-chip es">' + escapeHtml(card.es) + '</span><span class="bridge-arc"></span>';
    html += '<span class="bridge-chip en">' + escapeHtml(card.en) + '</span></div>';
    html += '<p class="etym-text">' + escapeHtml(card.etymology) + '</p>';
    html += '<div class="example-box"><div class="example-es">' + escapeHtml(card.example) + '</div>';
    html += '<div class="example-ko">' + escapeHtml(card.exampleKo) + '</div></div></div>';
  }
  html += '</div>';
  html += '<button class="nav-arrow" id="nextCard">›</button>';
  html += '</div>';
  html += '<div class="dot-row">' + (idx + 1) + ' / ' + filtered.length + '</div>';

  document.getElementById("tabContent").innerHTML = html;
  bindCardEvents();
}
function bindCardEvents() {
  document.querySelectorAll("[data-filter]").forEach(function (btn) {
    btn.addEventListener("click", function () {
      state.filter = btn.dataset.filter;
      state.cardIndex = 0;
      state.flipped = false;
      renderCards();
    });
  });
  var favToggle = document.getElementById("favToggle");
  if (favToggle) favToggle.addEventListener("click", function () {
    state.onlyFavorites = !state.onlyFavorites;
    state.cardIndex = 0;
    renderCards();
  });
  var prev = document.getElementById("prevCard");
  var next = document.getElementById("nextCard");
  var flip = document.getElementById("flipCard");
  var star = document.getElementById("starBtn");
  var speakBtn = document.getElementById("speakBtn");
  var filtered = getFilteredWords();
  if (prev) prev.addEventListener("click", function () {
    if (!filtered.length) return;
    state.flipped = false;
    state.cardIndex = (state.cardIndex - 1 + filtered.length) % filtered.length;
    renderCards();
  });
  if (next) next.addEventListener("click", function () {
    if (!filtered.length) return;
    state.flipped = false;
    state.cardIndex = (state.cardIndex + 1) % filtered.length;
    renderCards();
  });
  if (flip) flip.addEventListener("click", function () {
    var idx = filtered.length ? state.cardIndex % filtered.length : 0;
    var card = filtered[idx];
    state.flipped = !state.flipped;
    state.viewed.add(card.id);
    saveStore();
    renderHeader();
    renderCards();
  });
  if (star) star.addEventListener("click", function (e) {
    e.stopPropagation();
    var idx = filtered.length ? state.cardIndex % filtered.length : 0;
    var card = filtered[idx];
    if (state.favorites.has(card.id)) state.favorites.delete(card.id);
    else state.favorites.add(card.id);
    saveStore();
    renderCards();
  });
  if (speakBtn) speakBtn.addEventListener("click", function (e) {
    e.stopPropagation();
    var idx = filtered.length ? state.cardIndex % filtered.length : 0;
    speak(filtered[idx].es);
  });
}

function renderQuiz() {
  var word = findWord(state.quizWordId) || WORDS[0];
  var html = '<div class="rule-box"><b>스페인어 강세 규칙</b><br>' +
    '모음(a,e,i,o,u) · n · s로 끝나는 단어 → 뒤에서 두 번째 음절에 강세<br>' +
    '그 외 자음으로 끝나는 단어 → 마지막 음절에 강세<br>' +
    '규칙에서 벗어나면 악센트 부호(´)로 강세 위치를 표시해요.</div>';
  html += '<div class="quiz-card"><div class="quiz-prompt">강세가 있는 음절을 골라보세요</div>';
  html += '<div style="margin-bottom:8px;font-size:15px;color:var(--ink-soft);font-style:italic;">' + escapeHtml(word.ko) + ' · ' + escapeHtml(word.en) + '</div>';
  html += '<div class="syll-row">';
  word.syllables.forEach(function (s, i) {
    var cls = "syll-btn";
    if (state.quizFeedback) {
      if (i === word.stress) cls += " correct";
      else if (i === state.quizFeedback.idx) cls += " wrong";
    }
    html += '<button class="' + cls + '" data-idx="' + i + '"' + (state.quizFeedback ? " disabled" : "") + '>' + escapeHtml(s) + '</button>';
  });
  html += '<button class="speak-btn" id="quizSpeak">🔊</button></div>';
  html += '<div class="quiz-feedback ' + (state.quizFeedback ? (state.quizFeedback.correct ? "correct" : "wrong") : "") + '">' +
    (state.quizFeedback ? (state.quizFeedback.correct ? "정답이에요! 잘했어요." : "다음 문제로 넘어가면서 오답노트에 저장할게요.") : "") + '</div>';
  html += '</div>';
  document.getElementById("tabContent").innerHTML = html;

  document.querySelectorAll("[data-idx]").forEach(function (btn) {
    btn.addEventListener("click", function () {
      var idx = parseInt(btn.dataset.idx, 10);
      var correct = idx === word.stress;
      state.quizFeedback = { correct: correct, idx: idx };
      if (!correct) {
        state.mistakes.push({ rid: nextId(), type: "stress", wordId: word.id });
        saveStore();
        renderHeader();
      }
      renderQuiz();
      setTimeout(function () {
        state.quizFeedback = null;
        state.quizWordId = pickRandomWord(word.id).id;
        renderQuiz();
      }, correct ? 900 : 1400);
    });
  });
  var qs = document.getElementById("quizSpeak");
  if (qs) qs.addEventListener("click", function () { speak(word.es); });
}

function renderSentence() {
  var word = findWord(state.sentenceWordId) || WORDS[1];
  var html = '<div class="sentence-card">';
  html += '<div class="target-word"><span class="es-word">' + escapeHtml(word.es) + '</span>';
  html += '<button class="speak-btn" id="sentSpeak">🔊</button></div>';
  html += '<div class="target-meta">' + escapeHtml(word.ko) + ' · ' + escapeHtml(word.en) + ' — 이 단어를 사용해서 스페인어 문장을 만들어보세요</div>';
  html += '<textarea id="sentInput" placeholder="예: Me gusta la música.">' + escapeHtml(state.sentenceInput) + '</textarea>';
  html += '<div class="btn-row"><button class="btn primary" id="sentSubmit">확인하기</button>';
  html += '<button class="btn ghost" id="sentNext">다른 단어</button></div>';
  if (state.sentenceFeedback) {
    var fb = state.sentenceFeedback;
    html += '<div class="feedback-box ' + (fb.passed ? "pass" : "fail") + '">';
    if (fb.passed) html += "좋아요! '" + escapeHtml(word.es) + "'를 잘 사용한 문장이에요.";
    else if (!fb.containsWord) html += "문장에 '" + escapeHtml(word.es) + "' 단어가 보이지 않아요. 오답노트에 저장했어요.";
    else html += "단어는 잘 넣었지만 문장이 조금 짧아요 (3단어 이상 써보세요). 오답노트에 저장했어요.";
    html += '<div class="model">참고 예문: ' + escapeHtml(word.example) + ' <span style="font-style:normal;color:var(--ink-soft);">(' + escapeHtml(word.exampleKo) + ')</span></div></div>';
  }
  html += '<p style="font-size:11.5px;color:var(--ink-soft);margin-top:14px;">* 정교한 문법 검사는 아니고, 단어 사용 여부와 문장 길이를 확인하는 간단한 체크예요.</p>';
  html += '</div>';
  document.getElementById("tabContent").innerHTML = html;

  document.getElementById("sentInput").addEventListener("input", function (e) { state.sentenceInput = e.target.value; });
  document.getElementById("sentSpeak").addEventListener("click", function () { speak(word.es); });
  document.getElementById("sentSubmit").addEventListener("click", function () {
    var result = checkSentence(word, state.sentenceInput);
    state.sentenceFeedback = result;
    if (!result.passed) {
      state.mistakes.push({ rid: nextId(), type: "sentence", wordId: word.id, userAnswer: result.trimmed });
      saveStore();
      renderHeader();
    }
    renderSentence();
  });
  document.getElementById("sentNext").addEventListener("click", function () {
    var w = pickRandomWord(word.id);
    state.sentenceWordId = w.id;
    state.sentenceInput = "";
    state.sentenceFeedback = null;
    renderSentence();
  });
}

/* ------------------------------------------------------------------ */
/* Render: review tab                                                     */
/* ------------------------------------------------------------------ */
function clearMistake(rid) {
  state.mistakes = state.mistakes.filter(function (m) { return m.rid !== rid; });
  delete state.reviewInputs[rid];
  delete state.reviewInputs[rid + "-feedback"];
  saveStore();
  renderHeader();
}
function renderReview() {
  var stressMistakes = state.mistakes.filter(function (m) { return m.type === "stress"; });
  var sentenceMistakes = state.mistakes.filter(function (m) { return m.type === "sentence"; });
  var html = "";
  if (state.mistakes.length === 0) {
    html = '<div class="empty-state"><div class="icon">✨</div><div>아직 오답이 없어요. 퀴즈와 문장 연습에서 틀린 내용이 여기 모여요.</div></div>';
    document.getElementById("tabContent").innerHTML = html;
    return;
  }
  if (stressMistakes.length > 0) {
    html += '<div class="review-section-title">강세 퀴즈 오답 (' + stressMistakes.length + ')</div>';
    stressMistakes.forEach(function (m) {
      var w = findWord(m.wordId);
      html += '<div class="review-item"><div class="review-item-head"><span class="es-word">' + escapeHtml(w.es) + '</span>';
      html += '<span style="font-size:12.5px;color:var(--ink-soft);">' + escapeHtml(w.ko) + '</span></div>';
      html += '<div class="syll-row" style="justify-content:flex-start;">';
      w.syllables.forEach(function (s, i) {
        html += '<button class="syll-btn" style="font-size:16px;padding:7px 12px;" data-rid="' + m.rid + '" data-idx="' + i + '">' + escapeHtml(s) + '</button>';
      });
      html += '</div></div>';
    });
  }
  if (sentenceMistakes.length > 0) {
    html += '<div class="review-section-title">문장 만들기 오답 (' + sentenceMistakes.length + ')</div>';
    sentenceMistakes.forEach(function (m) {
      var w = findWord(m.wordId);
      var fb = state.reviewInputs[m.rid + "-feedback"];
      html += '<div class="review-item"><div class="review-item-head"><span class="es-word">' + escapeHtml(w.es) + '</span>';
      html += '<button class="icon-btn" data-clear="' + m.rid + '">✓</button></div>';
      html += '<div class="review-user-answer">이전 답: ' + escapeHtml(m.userAnswer || "(빈 문장)") + '</div>';
      html += '<div class="review-input-row"><input placeholder="다시 문장을 써보세요" data-input="' + m.rid + '" value="' + escapeHtml(state.reviewInputs[m.rid] || "") + '">';
      html += '<button class="icon-btn" data-retry="' + m.rid + '">↻</button></div>';
      if (fb && !fb.passed) html += '<div class="review-note">아직이에요 — \'' + escapeHtml(w.es) + '\'를 포함해서 3단어 이상으로 써보세요.</div>';
      html += '</div>';
    });
  }
  document.getElementById("tabContent").innerHTML = html;

  document.querySelectorAll("[data-rid][data-idx]").forEach(function (btn) {
    btn.addEventListener("click", function () {
      var rid = parseInt(btn.dataset.rid, 10);
      var idx = parseInt(btn.dataset.idx, 10);
      var m = state.mistakes.filter(function (x) { return x.rid === rid; })[0];
      if (!m) return;
      var w = findWord(m.wordId);
      if (idx === w.stress) clearMistake(rid);
      renderReview();
    });
  });
  document.querySelectorAll("[data-clear]").forEach(function (btn) {
    btn.addEventListener("click", function () {
      clearMistake(parseInt(btn.dataset.clear, 10));
      renderReview();
    });
  });
  document.querySelectorAll("[data-input]").forEach(function (inp) {
    inp.addEventListener("input", function () {
      state.reviewInputs[inp.dataset.input] = inp.value;
    });
  });
  document.querySelectorAll("[data-retry]").forEach(function (btn) {
    btn.addEventListener("click", function () {
      var rid = parseInt(btn.dataset.retry, 10);
      var m = state.mistakes.filter(function (x) { return x.rid === rid; })[0];
      if (!m) return;
      var w = findWord(m.wordId);
      var val = state.reviewInputs[rid] || "";
      var result = checkSentence(w, val);
      if (result.passed) { clearMistake(rid); }
      else { state.reviewInputs[rid + "-feedback"] = result; }
      renderReview();
    });
  });
}

/* ------------------------------------------------------------------ */
/* Main render + tab switching                                           */
/* ------------------------------------------------------------------ */
function renderTab() {
  if (state.tab === "cards") renderCards();
  else if (state.tab === "quiz") renderQuiz();
  else if (state.tab === "sentence") renderSentence();
  else if (state.tab === "review") renderReview();
}
document.querySelectorAll(".tab-btn").forEach(function (btn) {
  btn.addEventListener("click", function () {
    state.tab = btn.dataset.tab;
    renderHeader();
    renderTab();
  });
});

renderHeader();
renderInstallTip();
renderTab();
if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = function () {};
}
</script>
